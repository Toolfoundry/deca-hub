<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Secure Payment Upload</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; width: 88%; max-width: 380px; padding: 35px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center; }
    .logo { font-size: 22px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.5px; }
    #biz-name { display: inline-block; padding: 5px 14px; background: #f0f7ff; color: #007bff; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin: 12px 0 25px; }
    #file-label { display: block; background: #007bff; color: white; padding: 18px; border-radius: 16px; cursor: pointer; font-weight: 700; font-size: 16px; box-shadow: 0 4px 12px rgba(0,123,255,0.3); transition: all 0.2s ease; }
    #file-label:active { transform: translateY(2px); background: #0069d9; }
    #file-input { display: none; }
    #status { margin-top: 25px; font-size: 14px; line-height: 1.5; color: #555; }
    #preview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 20px; border-radius: 12px; display: none; border: 2px dashed #eee; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Secure Pay</div>
    <div id="biz-name">Loading...</div>
    
    <label id="file-label" for="file-input">Select Screenshot</label>
    <input type="file" id="file-input" accept="image/*">
    
    <img id="preview">
    <div id="status">Upload proof of transfer to continue</div>
  </div>

  <script>
    // --- 1. 配置：修改为你的 Worker 域名 ---
    const worker_endpoint = "https://order-notifier.risstrument.workers.dev/api/upload-temp";

    // --- 2. 获取 URL 参数 ---
    const urlParams = new URLSearchParams(window.location.search);
    const tempId = urlParams.get('temp_id');
    const biz = urlParams.get('biz') || "SYSTEM";

    // 更新 UI 上的商家名称
    document.getElementById('biz-name').innerText = biz + " Secure Upload";

    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');

    // --- 3. 压缩图片逻辑 ---
    async function compressImage(file, maxWidth = 1200, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;
            if (width > maxWidth) {
              height = Math.round((maxWidth / width) * height);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
          };
        };
      });
    }

    // --- 4. 监听文件选择 ---
    fileInput.onchange = async () => {
      const originalFile = fileInput.files[0];
      if (!originalFile || !tempId) {
        status.innerText = "❌ Missing Session ID or File";
        return;
      }

      fileInput.disabled = true;
      status.innerHTML = "<span style='color:#007bff'>🌀 Processing...</span>";

      try {
        const compressedBlob = await compressImage(originalFile);
        preview.src = URL.createObjectURL(compressedBlob);
        preview.style.display = 'block';
        status.innerHTML = "<span style='color:#007bff'>🚀 Uploading...</span>";

        const formData = new FormData();
        formData.append('file', compressedBlob, 'receipt.jpg');
        formData.append('temp_id', tempId);
        formData.append('biz', biz);

        // 发送到 Worker API
        const res = await fetch(worker_endpoint, { 
            method: 'POST', 
            body: formData,
            // 确保跨域
            mode: 'cors' 
        });

        if (res.ok) {
          document.getElementById('file-label').style.display = 'none';
          status.innerHTML = "✅ <b style='color:#28a745'>Upload Success!</b><br>You can now return to your computer to complete the checkout.";
          if (navigator.vibrate) navigator.vibrate(200); 
        } else {
          throw new Error("Server rejected upload");
        }
      } catch (e) {
        console.error(e);
        status.innerHTML = "<span style='color:#dc3545'>❌ Upload Failed</span><br>Please try again or use desktop upload.";
        fileInput.disabled = false;
      }
    };
  </script>
</body>
</html>
