<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Secure Payment Upload</title>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; background: #f4f7f9; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; width: 88%; max-width: 380px; padding: 35px 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); text-align: center; }
    .logo { font-size: 22px; font-weight: 800; color: #1a1a1a; letter-spacing: -0.5px; }
    #biz-name { display: inline-block; padding: 5px 14px; background: #f0f7ff; color: #007bff; border-radius: 100px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin: 12px 0 25px; }
    #file-label { display: block; background: #007bff; color: white; padding: 18px; border-radius: 16px; cursor: pointer; font-weight: 700; font-size: 16px; box-shadow: 0 4px 12px rgba(0,123,255,0.3); transition: all 0.2s ease; }
    #file-label:active { transform: translateY(2px); background: #0069d9; }
    #file-input { display: none; }
    #status { margin-top: 25px; font-size: 14px; line-height: 1.5; color: #555; }
    #preview { width: 100%; max-height: 200px; object-fit: contain; margin-top: 20px; border-radius: 12px; display: none; border: 2px dashed #eee; }
  </style>
</head>
<body>
<div class="card">
    <div class="logo">Secure Pay</div>
    <div id="biz-name">Loading...</div>
    <label id="file-label" for="file-input">Select Screenshot</label>
    <input type="file" id="file-input" accept="image/*">
    
    <img id="preview" style="display:none; width:100%; border-radius:12px; margin-top:15px;">
    <button id="upload-btn" style="display:none; width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:16px; font-weight:700; margin-top:15px; cursor:pointer;">
      Confirm & Send Receipt
    </button>
    
    <div id="status" style="margin-top:15px;">Upload proof of transfer to continue</div>
</div>

<script>
    // --- 1. 定期清理旧的 LocalStorage (24小时) ---
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('up_ok_')) {
        const timestamp = parseInt(key.split('_')[2]);
        if (Date.now() - timestamp > 86400000) {
          localStorage.removeItem(key);
        }
      }
    }

    const urlParams = new URLSearchParams(window.location.search);
    const tempId = urlParams.get('temp_id');
    const biz = urlParams.get('biz') || "SYSTEM";
    const worker_endpoint = "https://order-notifier.risstrument.workers.dev/api/upload-temp";

    document.getElementById('biz-name').innerText = biz + " Secure Upload";

    const fileInput = document.getElementById('file-input');
    const status = document.getElementById('status');
    const preview = document.getElementById('preview');
    const uploadBtn = document.getElementById('upload-btn');
    const fileLabel = document.getElementById('file-label');

    let currentFileBlob = null; // 存储压缩后的文件

    // --- 2. 检查状态 ---
    function isAlreadyDone() {
      if (!tempId) return false;
      return !!localStorage.getItem(`up_ok_${tempId}`);
    }

    if (isAlreadyDone()) {
      fileLabel.style.display = 'none';
      status.innerHTML = "✅ <b style='color:#28a745'>Submitted</b><br>Receipt already sent for this session.";
    }

    // --- 3. 压缩函数 ---
    async function compressImage(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = e => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxWidth = 1200;
            let { width, height } = img;
            if (width > maxWidth) {
              height = Math.round((maxWidth / width) * height);
              width = maxWidth;
            }
            canvas.width = width;
            canvas.height = height;
            canvas.getContext('2d').drawImage(img, 0, 0, width, height);
            canvas.toBlob(b => resolve(b), 'image/jpeg', 0.7);
          };
        };
      });
    }

    // --- 4. 选择文件逻辑 ---
    fileInput.onchange = async () => {
      const file = fileInput.files[0];
      if (!file || !tempId) return;

      status.innerHTML = "🌀 Processing...";
      currentFileBlob = await compressImage(file);
      
      preview.src = URL.createObjectURL(currentFileBlob);
      preview.style.display = 'block';
      uploadBtn.style.display = 'block';
      fileLabel.innerText = "Change Photo";
      status.innerHTML = "☝️ <b>Check the photo</b>, then click confirm.";
    };

    // --- 5. 确认上传逻辑 ---
    uploadBtn.onclick = async () => {
      if (!currentFileBlob || !tempId) return;

      uploadBtn.disabled = true;
      uploadBtn.style.opacity = "0.6";
      status.innerHTML = "🚀 Uploading...";

      const formData = new FormData();
      formData.append('file', currentFileBlob, 'receipt.jpg');
      formData.append('temp_id', tempId);
      formData.append('biz', biz);

      try {
        const res = await fetch(worker_endpoint, { method: 'POST', body: formData, mode: 'cors' });
        if (res.ok) {
          localStorage.setItem(`up_ok_${tempId}`, Date.now());
          fileLabel.style.display = 'none';
          uploadBtn.style.display = 'none';
          status.innerHTML = "✅ <b style='color:#28a745'>Upload Success!</b><br>You can now finish on your computer.";
          if (navigator.vibrate) navigator.vibrate(200);
        } else { throw new Error(); }
      } catch (e) {
        status.innerHTML = "<span style='color:#dc3545'>❌ Failed. Try again.</span>";
        uploadBtn.disabled = false;
        uploadBtn.style.opacity = "1";
      }
    };
</script>
</body>
</html>
